<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Urban Lens — Simulação Urbana SP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── LIVE NEWS BANNER ── -->
<div id="banner">
  <div id="bn-wrap">
    <div id="bn-live">
      <div id="live-dot"></div>
      AO VIVO
    </div>
    <div id="bn-breaking">EMERGÊNCIA</div>
    <div id="bn-ticker">
      <div id="bn-text">Inicializando simulação...</div>
    </div>
    <div id="bn-right">
      <div id="bn-timer">
        <div id="timer-track"><div id="timer-fill"></div></div>
        <div id="timer-clock">10:00</div>
      </div>
      <div id="bn-crisis">
        <div id="crisis-n">01</div>
        <div id="crisis-of">DE 10 CRISES</div>
      </div>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- PAINEL ESQUERDO -->
  <aside id="panel-l">
    <!-- Wordmark -->
    <div id="wordmark">
      <div id="wm-title">URBAN LENS</div>
      <div id="wm-sub">SIMULAÇÃO URBANA · SÃO PAULO</div>
    </div>

    <!-- Brief da crise -->
    <div id="crisis-brief">
      <span class="lbl">SITUAÇÃO ATIVA</span>
      <div id="cb-titulo">—</div>
      <div id="cb-fase">—</div>
    </div>

    <!-- Toggle de Camadas -->
    <div id="layers-title">
      <span class="lbl">CAMADAS DE DADOS</span>
    </div>
    <div id="layers"></div>

    <!-- Degradação -->
    <div id="phase-wrap">
      <span class="lbl">DEGRADAÇÃO DA CRISE</span>
      <div id="phase-bar-bg"><div id="phase-bar"></div></div>
      <div id="phase-list">
        <!-- preenchido por JS -->
      </div>
    </div>

    <!-- Botões -->
    <div id="left-btns">
      <button id="btn-next">PRÓXIMA CRISE →</button>
      <button id="btn-restart">↺ Reiniciar esta crise</button>
    </div>
  </aside>

  <!-- MAPA CENTRAL -->
  <main id="map-wrap">
    <div id="map"></div>
    <div id="map-loader">
      <div class="spin"></div>
      <span>CARREGANDO MAPA DE SÃO PAULO</span>
    </div>
    <div id="map-legend"></div>
  </main>

  <!-- PAINEL DIREITO -->
  <aside id="panel-r">
    <div id="pr-header">
      <div id="pr-hl">CAMADA ATIVA</div>
      <div id="pr-layer">—</div>
    </div>

    <!-- KPIs -->
    <div id="kpis-section">
      <span class="lbl">INDICADORES EM TEMPO REAL</span>
      <div id="kpis-grid"></div>
    </div>

    <!-- Gráfico -->
    <div id="chart-section">
      <div class="section-title">CURVA DE DEGRADAÇÃO — 10 MIN</div>
      <div id="chart-canvas-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- Chat de Investigação -->
    <div id="chat-section">
      <div class="section-title">GRUPO DE INVESTIGAÇÃO</div>
      <div id="chat-messages"></div>
    </div>
  </aside>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
